<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luna de Limón</title>
  <meta name="description" content="Closets a medida y comida casera en Colombia. Pide por WhatsApp." />
  <meta property="og:title" content="Luna de Limón" />
  <meta property="og:description" content="Closets a medida y comida casera. Negocio colombiano." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ NAVBAR (persiste en todas las rutas) ═══ -->
  <nav id="navbar">
    <a href="/" class="nav-logo" data-link>Luna <em>de Limón</em></a>

    <ul class="nav-links" id="navLinks">
      <li><a href="/" data-link>Inicio</a></li>
      <li><a href="/closets" data-link>Closets</a></li>
      <li><a href="/comida" data-link>Comida</a></li>
    </ul>

    <div class="nav-right">
      <!-- Carrito -->
      <button class="cart-btn" id="cartBtn" aria-label="Ver carrito">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-count" id="cartCount" aria-live="polite">0</span>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ═══ CONTENIDO DE LA RUTA ACTUAL ═══ -->
  <main id="app"></main>

  <!-- ═══ DRAWER DEL CARRITO ═══ -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer" aria-label="Carrito de compras">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button class="cart-close" id="cartClose" aria-label="Cerrar carrito">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter"></div>
  </aside>

  <!-- ═══ MODAL DE PEDIDO (último paso del carrito) ═══ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h3 id="modalTitle">Finalizar pedido</h3>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-subtitle">Solo enviamos dentro del departamento del Atlántico.</p>

        <!-- Datos de contacto -->
        <p class="form-section-label">Tus datos</p>
        <div class="form-row">
          <div class="form-group">
            <label for="fname">Nombre</label>
            <input type="text" id="fname" placeholder="Tu nombre" autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label for="fphone">WhatsApp</label>
            <input type="tel" id="fphone" placeholder="314 456 7890" autocomplete="tel" />
          </div>
        </div>

        <!-- Dirección -->
        <p class="form-section-label">Dirección de entrega</p>
        <div class="form-group">
          <label for="fmunicipality">Municipio</label>
          <select id="fmunicipality">
            <option value="">Selecciona un municipio…</option>
            <optgroup label="Área Metropolitana">
              <option>Barranquilla</option>
              <option>Soledad</option>
              <option>Malambo</option>
              <option>Galapa</option>
              <option>Puerto Colombia</option>
            </optgroup>
            <optgroup label="Subregión Costera">
              <option>Tubará</option>
              <option>Juan de Acosta</option>
              <option>Piojó</option>
              <option>Usiacurí</option>
            </optgroup>
            <optgroup label="Subregión Oriental">
              <option>Ponedera</option>
              <option>Palmar de Varela</option>
              <option>Santo Tomás</option>
              <option>Sabanagrande</option>
            </optgroup>
            <optgroup label="Subregión Centro">
              <option>Baranoa</option>
              <option>Luruaco</option>
              <option>Polonuevo</option>
              <option>Sabanalarga</option>
            </optgroup>
            <optgroup label="Subregión Sur">
              <option>Repelón</option>
              <option>Manatí</option>
              <option>Santa Lucía</option>
              <option>Suan</option>
              <option>Campo de la Cruz</option>
              <option>Candelaria</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label for="fneighborhood">Barrio / Sector <span class="optional">(opcional)</span></label>
          <input type="text" id="fneighborhood" placeholder="Ej: El Recreo, Riomar, Centro…" />
        </div>
        <div class="form-group">
          <label for="faddress">Dirección</label>
          <input type="text" id="faddress" placeholder="Ej: Cra 45 #74-12" autocomplete="street-address" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="fapt">Apto / Casa / Torre <span class="optional">(opcional)</span></label>
            <input type="text" id="fapt" placeholder="Ej: Apto 301, Torre B" />
          </div>
          <div class="form-group">
            <label for="freference">Punto de referencia <span class="optional">(opcional)</span></label>
            <input type="text" id="freference" placeholder="Ej: Frente al parque" />
          </div>
        </div>

        <!-- Horario -->
        <p class="form-section-label">Horario de recepción</p>
        <div class="form-group">
          <label for="fschedule">¿Cuándo puedes recibir?</label>
          <select id="fschedule">
            <option value="">Selecciona una franja…</option>
            <option>Mañana (8:00 am – 12:00 m)</option>
            <option>Tarde (12:00 m – 6:00 pm)</option>
            <option>Noche (6:00 pm – 9:00 pm)</option>
            <option>Todo el día (desde las 8:00 am)</option>
            <option>Acordar con el negocio</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fschedule-note">Nota de horario <span class="optional">(opcional)</span></label>
          <input type="text" id="fschedule-note" placeholder="Ej: Solo sábados, después de las 3 pm…" />
        </div>

        <!-- Notas generales -->
        <div class="form-group">
          <label for="fnotes">Notas adicionales <span class="optional">(opcional)</span></label>
          <textarea id="fnotes" placeholder="Medidas especiales, fecha deseada, instrucciones de instalación…"></textarea>
        </div>

        <div class="modal-summary" id="modalSummary"></div>

        <button class="btn-whatsapp" id="btnSendWA">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pedido por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ BOTÓN FLOTANTE WHATSAPP ═══ -->
  <a class="wa-float" href="https://wa.me/573107102765" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script src="script.js"></script>
</body>
</html>
